name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + eval gate (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run test suite
        run: uv run pytest -q

      # Runs the real graph over the golden dataset in mock-LLM mode, so the
      # regression gate needs no API key and no network.
      - name: Evaluation gate
        run: uv run python -m smartingest.eval.runner --mock
