# ---------------------------------------------------------------------------
# Business rules consumed by the Validator agent.
#
# These are *deterministic* checks applied to the structured fields produced
# by the Extractor. Keeping them in config (rather than code or an LLM prompt)
# means a non-engineer can tune routing behaviour without a redeploy.
# ---------------------------------------------------------------------------

# Global thresholds applied across all document types.
thresholds:
  # Extraction confidence below this triggers a Validator -> Extractor retry.
  min_confidence: 0.75
  # Invoice totals above this amount are always flagged for human review.
  invoice_auto_approve_max_amount: 10000.0

# Vendors that are pre-approved. Invoices from unknown vendors are flagged
# rather than auto-approved. Case-insensitive substring match.
vendor_whitelist:
  - "Acme Corp"
  - "Globex"
  - "Initech"
  - "Umbrella Industries"
  - "Stark Industries"

# Well-formedness patterns for vendor tax IDs. The Validator picks the matching
# pattern by shape; an unrecognised-but-present tax id is flagged as a warning.
tax_id_formats:
  gstin: "^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$"
  pan: "^[A-Z]{5}[0-9]{4}[A-Z]$"
  ein: "^[0-9]{2}-?[0-9]{7}$"
  vat: "^[A-Z]{2}[0-9A-Z]{2,12}$"

# Well-formedness patterns for ID numbers, keyed by id_type.
id_number_formats:
  aadhaar: "^[2-9][0-9]{3}\\s?[0-9]{4}\\s?[0-9]{4}$"
  pan: "^[A-Z]{5}[0-9]{4}[A-Z]$"
  passport: "^[A-Z][0-9]{7}$"
  drivers_license: "^[A-Z0-9-]{6,20}$"

# Per-document-type validation settings.
document_types:
  invoice:
    # Fields that must be present and non-empty for the document to be valid.
    required_fields:
      - vendor_name
      - invoice_number
      - total_amount
      - invoice_date
    # Allow the extracted line-item sum (+tax +shipping -discount) to differ
    # from the grand total by at most this absolute amount (rounding/tax quirks).
    total_tolerance: 0.05
  contract:
    required_fields:
      - parties
      - effective_date
  resume:
    required_fields:
      - candidate_name
      - email
  id_document:
    required_fields:
      - full_name
      - id_number
